<!DOCTYPE html>
<html style="visibility: hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="css/app.css">
    <script type="text/javascript" src="js/plugin.js"></script>
</head>

<body>
	<div class="app">

		<header>
			<div class="draggable">
				<img src="assets/logo.png" alt="Logo" width="24" height="24">
				<h1 id="appName">Twitter Video Downloader</h1>
			</div>
			<div class="header-buttons">
				<div class="header-btn" id="settingsButton" title="Settings">
					<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
						<path d="M7.50425 0.134915L1.49575 3.63273C1.18839 3.81262 1 4.14241 1 4.50219L1 11.4978C1 11.8576 1.18839 12.1874 1.49575 12.3673L7.50425 15.8651C7.81161 16.045 8.18839 16.045 8.49575 15.8651L14.5042 12.3673C14.8116 12.1874 15 11.8576 15 11.4978V4.50219C15 4.14241 14.8116 3.81262 14.5042 3.63273L8.49575 0.134915C8.18839 -0.0449721 7.81161 -0.0449721 7.50425 0.134915ZM14.0085 4.50219V11.4978L8 14.9956L1.9915 11.4978L1.9915 4.50219L8 1.00437L14.0085 4.50219ZM5.0255 8C5.0255 9.65896 6.35411 10.9981 8 10.9981C9.64589 10.9981 10.9745 9.65896 10.9745 8C10.9745 6.34104 9.64589 5.00187 8 5.00187C6.35411 5.00187 5.0255 6.34104 5.0255 8ZM9.983 8C9.983 9.09931 9.09065 9.99875 8 9.99875C6.90935 9.99875 6.017 9.09931 6.017 8C6.017 6.90069 6.90935 6.00125 8 6.00125C9.09065 6.00125 9.983 6.90069 9.983 8Z" fill="currentColor"/>
					</svg>
				</div>
				<div class="header-btn" id="closeButton" title="Close">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
						<path fill-rule="evenodd" clip-rule="evenodd" d="M12.7071 12.0001L16.8531 7.85413C17.0491 7.65813 17.0491 7.34213 16.8531 7.14613C16.6581 6.95113 16.3421 6.95113 16.1461 7.14613L12.0001 11.2931L7.85313 7.14613C7.65813 6.95113 7.34213 6.95113 7.14613 7.14613C6.95113 7.34213 6.95113 7.65813 7.14613 7.85413L11.2931 12.0001L7.14613 16.1461C6.95113 16.3421 6.95113 16.6581 7.14613 16.8541C7.24413 16.9511 7.37213 17.0001 7.50013 17.0001C7.62813 17.0001 7.75613 16.9511 7.85313 16.8541L12.0001 12.7071L16.1461 16.8541C16.2441 16.9511 16.3721 17.0001 16.5001 17.0001C16.6281 17.0001 16.7561 16.9511 16.8531 16.8541C17.0491 16.6581 17.0491 16.3421 16.8531 16.1461L12.7071 12.0001Z" fill="currentColor"/>
					</svg>
				</div>
			</div>
		</header>

		<main>
			<div class="container">
				<label for="twitterUrl">Twitter / X URL</label>
				<form id="downloadForm">
					<input type="text" id="twitterUrl" placeholder="Paste Twitter video URL here">
					<button type="submit"><span>Download</span></button>
				</form>
				<div id="status"></div>
			</div>
		</main>

		<div class="settings-overlay" id="settingsOverlay">
			<div class="container">
				<label>Settings</label>
				<div class="block-content">
					<div class="checkbox-item">
						<label class="control checkbox">
							<input type="checkbox" id="autoClose">
							<span class="control-indicator"></span>
							Auto close after download
						</label>
					</div>
				</div>
			</div>
		</div>

	</div>
</body>
</html>
